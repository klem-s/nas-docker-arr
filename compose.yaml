services:
  # ─────────────────────────────────────────
  #  HOMEPAGE – Dashboard
  # ─────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ${CONFIG}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.homepage.entrypoints=websecure
      - traefik.http.routers.homepage.tls.certresolver=letsencrypt
      - traefik.http.services.homepage.loadbalancer.server.port=3000

  # ─────────────────────────────────────────
  #  NORDVPN – VPN pour qBittorrent
  # ─────────────────────────────────────────
  nordvpn:
    image: ghcr.io/bubuntux/nordvpn:latest
    container_name: nordvpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TOKEN=${NORDVPN_TOKEN}
      - CONNECT=France
      - TECHNOLOGY=NordLynx
      - NETWORK=192.168.1.0/24,172.17.0.0/16,172.19.0.0/16,192.168.27.0/24
      - KILL_SWITCH=off
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  QBITTORRENT – Torrent via NordVPN
  # ─────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:nordvpn
    depends_on:
      - nordvpn
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG}/qbittorrent:/config
      - ${DOWNLOADS}:/downloads
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbit.${DOMAIN}`)
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

  # ─────────────────────────────────────────
  #  PROWLARR – Indexeurs
  # ─────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/prowlarr:/config
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls.certresolver=letsencrypt
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696

  # ─────────────────────────────────────────
  #  SONARR – Séries
  # ─────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/sonarr:/config
      - ${MEDIA}/series:/tv
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls.certresolver=letsencrypt
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

  # ─────────────────────────────────────────
  #  RADARR – Films
  # ─────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/radarr:/config
      - ${MEDIA}/films:/movies
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    ports:
      - 7878:7878
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls.certresolver=letsencrypt
      - traefik.http.services.radarr.loadbalancer.server.port=7878

  # ─────────────────────────────────────────
  #  LIDARR – Musique
  # ─────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/lidarr:/config
      - ${MEDIA}/musique:/music
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN}`)
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls.certresolver=letsencrypt
      - traefik.http.services.lidarr.loadbalancer.server.port=8686

  # ─────────────────────────────────────────
  #  READARR – Livres
  # ─────────────────────────────────────────

  # ─────────────────────────────────────────
  #  BAZARR – Sous-titres
  # ─────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/bazarr:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)
      - traefik.http.routers.bazarr.entrypoints=websecure
      - traefik.http.routers.bazarr.tls.certresolver=letsencrypt
      - traefik.http.services.bazarr.loadbalancer.server.port=6767

  # ─────────────────────────────────────────
  #  PLEX – Streaming
  # ─────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${CONFIG}/plex:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
      - ${MEDIA}/musique:/music
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  JELLYFIN – Streaming alternatif
  # ─────────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/jellyfin:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
      - ${MEDIA}/musique:/music
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls.certresolver=letsencrypt
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  # ─────────────────────────────────────────
  #  OVERSEERR – Requêtes médias
  # ─────────────────────────────────────────
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/seerr:/config
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.overseerr.rule=Host(`seerr.${DOMAIN}`)
      - traefik.http.routers.overseerr.entrypoints=websecure
      - traefik.http.routers.overseerr.tls.certresolver=letsencrypt
      - traefik.http.services.overseerr.loadbalancer.server.port=5055

  # ─────────────────────────────────────────
  #  TAUTULLI – Stats Plex
  # ─────────────────────────────────────────
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/tautulli:/config
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.tautulli.rule=Host(`tautulli.${DOMAIN}`)
      - traefik.http.routers.tautulli.entrypoints=websecure
      - traefik.http.routers.tautulli.tls.certresolver=letsencrypt
      - traefik.http.services.tautulli.loadbalancer.server.port=8181

  # ─────────────────────────────────────────
  #  JELLYSTAT – Stats Jellyfin
  # ─────────────────────────────────────────
  jellystat-db:
    image: postgres:15
    container_name: jellystat-db
    environment:
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat
      - POSTGRES_DB=jellystat
    volumes:
      - ${CONFIG}/jellystat-db:/var/lib/postgresql/data
    networks:
      - proxy
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    environment:
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - JWT_SECRET=changeme_secret_jellystat
    volumes:
      - ${CONFIG}/jellystat:/app/backend/backup-data
    depends_on:
      - jellystat-db
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellystat.rule=Host(`jellystat.${DOMAIN}`)
      - traefik.http.routers.jellystat.entrypoints=websecure
      - traefik.http.routers.jellystat.tls.certresolver=letsencrypt
      - traefik.http.services.jellystat.loadbalancer.server.port=3000
networks:
  proxy:
    external: true
