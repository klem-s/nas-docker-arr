services:
  # ─────────────────────────────────────────
  #  HOMEPAGE – Dashboard
  # ─────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ${CONFIG}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    ports:
      - "3000:3000"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-lan.rule=Host(`homepage.lan`)
      - traefik.http.routers.homepage-lan.entrypoints=web
      - traefik.http.services.homepage-lan.loadbalancer.server.port=3000

  # ─────────────────────────────────────────
  #  NORDVPN – VPN pour qBittorrent
  # ─────────────────────────────────────────
  nordvpn:
    image: ghcr.io/bubuntux/nordvpn:latest
    container_name: nordvpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TOKEN=${NORDVPN_TOKEN}
      - CONNECT=France
      - TECHNOLOGY=NordLynx
      - NETWORK=192.168.1.0/24,172.17.0.0/16,172.19.0.0/16,192.168.27.0/24
      - KILL_SWITCH=off
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  QBITTORRENT – Torrent via NordVPN
  # ─────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:nordvpn
    depends_on:
      - nordvpn
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG}/qbittorrent:/config
      - ${DOWNLOADS}:/downloads
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  PROWLARR – Indexeurs
  # ─────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/prowlarr:/config
    networks:
      - proxy
    ports:
      - "9696:9696"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr-lan.rule=Host(`prowlarr.lan`)
      - traefik.http.routers.prowlarr-lan.entrypoints=web
      - traefik.http.services.prowlarr-lan.loadbalancer.server.port=9696

  # ─────────────────────────────────────────
  #  SONARR – Séries
  # ─────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/sonarr:/config
      - ${MEDIA}/series:/tv
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    ports:
      - "8989:8989"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr-lan.rule=Host(`sonarr.lan`)
      - traefik.http.routers.sonarr-lan.entrypoints=web
      - traefik.http.services.sonarr-lan.loadbalancer.server.port=8989

  # ─────────────────────────────────────────
  #  RADARR – Films
  # ─────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/radarr:/config
      - ${MEDIA}/films:/movies
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    ports:
      - "7878:7878"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr-lan.rule=Host(`radarr.lan`)
      - traefik.http.routers.radarr-lan.entrypoints=web
      - traefik.http.services.radarr-lan.loadbalancer.server.port=7878

  # ─────────────────────────────────────────
  #  LIDARR – Musique
  # ─────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/lidarr:/config
      - ${MEDIA}/musique:/music
      - ${DOWNLOADS}:/downloads
    networks:
      - proxy
    ports:
      - "8686:8686"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr-lan.rule=Host(`lidarr.lan`)
      - traefik.http.routers.lidarr-lan.entrypoints=web
      - traefik.http.services.lidarr-lan.loadbalancer.server.port=8686

  # ─────────────────────────────────────────
  #  BAZARR – Sous-titres
  # ─────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/bazarr:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
    networks:
      - proxy
    ports:
      - "6767:6767"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr-lan.rule=Host(`bazarr.lan`)
      - traefik.http.routers.bazarr-lan.entrypoints=web
      - traefik.http.services.bazarr-lan.loadbalancer.server.port=6767

  # ─────────────────────────────────────────
  #  PLEX – Streaming
  # ─────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${CONFIG}/plex:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
      - ${MEDIA}/musique:/music
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  JELLYFIN – Streaming alternatif
  # ─────────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/jellyfin:/config
      - ${MEDIA}/films:/movies
      - ${MEDIA}/series:/tv
      - ${MEDIA}/musique:/music
    networks:
      - proxy
    ports:
      - "8096:8096"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls.certresolver=letsencrypt
      - traefik.http.routers.jellyfin-lan.rule=Host(`jellyfin.lan`)
      - traefik.http.routers.jellyfin-lan.entrypoints=web
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  # ─────────────────────────────────────────
  #  OVERSEERR – Requêtes médias
  # ─────────────────────────────────────────
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/seerr:/config
    networks:
      - proxy
    ports:
      - "5055:5055"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.overseerr.rule=Host(`seerr.${DOMAIN}`)
      - traefik.http.routers.overseerr.entrypoints=websecure
      - traefik.http.routers.overseerr.tls.certresolver=letsencrypt
      - traefik.http.routers.overseerr-lan.rule=Host(`seerr.lan`)
      - traefik.http.routers.overseerr-lan.entrypoints=web
      - traefik.http.services.overseerr.loadbalancer.server.port=5055

  # ─────────────────────────────────────────
  #  TAUTULLI – Stats Plex
  # ─────────────────────────────────────────
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG}/tautulli:/config
    networks:
      - proxy
    ports:
      - "8181:8181"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.tautulli-lan.rule=Host(`tautulli.lan`)
      - traefik.http.routers.tautulli-lan.entrypoints=web
      - traefik.http.services.tautulli-lan.loadbalancer.server.port=8181

  # ─────────────────────────────────────────
  #  JELLYSTAT – Stats Jellyfin
  # ─────────────────────────────────────────
  jellystat-db:
    image: postgres:15
    container_name: jellystat-db
    environment:
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat
      - POSTGRES_DB=jellystat
    volumes:
      - ${CONFIG}/jellystat-db:/var/lib/postgresql/data
    networks:
      - proxy
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    environment:
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - JWT_SECRET=changeme_secret_jellystat
    volumes:
      - ${CONFIG}/jellystat:/app/backend/backup-data
    depends_on:
      - jellystat-db
    networks:
      - proxy
    ports:
      - "3001:3000"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellystat-lan.rule=Host(`jellystat.lan`)
      - traefik.http.routers.jellystat-lan.entrypoints=web
      - traefik.http.services.jellystat-lan.loadbalancer.server.port=3000

networks:
  proxy:
    external: true
